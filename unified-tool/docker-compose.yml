# ============================================
# 商机数据综合分析平台 - Docker Compose
# 使用方法：
#   1. 复制 .env.example 为 .env，填入邮箱配置
#   2. docker compose up -d --build
# ============================================

services:
  web:
    build: .
    container_name: business-tool
    restart: unless-stopped
    ports:
      - "9527:9527"
    env_file:
      - .env
    volumes:
      # 持久化数据目录（配置、联系人、模板、上传文件等）
      - ./data:/app/data
      # 容器内 /tmp 给 Playwright 和 Excel 处理足够空间
      - tmp_data:/tmp
    # Playwright 需要的内核参数（Docker 中运行 Chromium 必需）
    security_opt:
      - seccomp:unconfined
    # 资源限制（Playwright + Chromium 至少需要 1GB 内存）
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  tmp_data:
