<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商机数据过滤分析系统</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="hdr">
  <div class="hdr-L">
    <div class="hdr-ico">B</div>
    <div><h1>商机数据过滤分析系统</h1><div class="sub">FILTER · GROUP · ANALYZE</div></div>
  </div>
  <div class="hdr-R" id="hdrR" style="display:none">
    <div class="hs"><div class="v" id="hAll">0</div><div class="l">总行</div></div>
    <div class="hs"><div class="v" id="hFil">0</div><div class="l">筛选后</div></div>
    <div class="hs"><div class="v" id="hCol">0</div><div class="l">列</div></div>
  </div>
</header>

<!-- UPLOAD -->
<div class="up-wrap" id="upWrap">
  <div class="up-box" id="upBox">
    <span class="i">📂</span>
    <div class="t1">上传 Excel 文件</div>
    <div class="t2">拖拽或点击选择 .xlsx / .xls / .csv（支持多个文件）</div>
    <button class="bp b" style="margin-top:14px">选择文件</button>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
  </div>
</div>

<!-- MAIN VIEW -->
<div id="mainView">
  <div class="tb">
    <div class="file-tabs" id="fileTabs"></div>
    <div class="sp"></div>
    <button class="b bsm bg" id="btnClrL1">清空L1</button>
    <button class="b bsm bg" id="btnClrL2">清空L2</button>
    <button class="b bsm bg" id="btnColMgr">👁 列管理</button>
    <button class="bp b bsm" id="btnResult">查看统计结果 →</button>
    <button class="b bsm" id="btnReup">+ 上传文件</button>
  </div>

  <div class="tw" id="tw">
    <table class="tbl" id="dtbl">
      <thead id="dth"></thead>
      <tbody id="dtb"></tbody>
    </table>
  </div>

  <!-- L2 AREA -->
  <div class="l2-bar">
    <div class="l2-toggle" id="l2Tog">
      <h3>二级组合 <span style="background:var(--wnbg);color:var(--wn);font-size:9px;padding:1px 6px;border-radius:6px">L2</span></h3>
      <span class="arr">▼</span>
    </div>
    <div class="l2-body" id="l2Body">
      <div class="l2-form">
        <div class="f"><label>列</label><select id="gCol"><option value="">-- 列 --</option></select></div>
        <div class="f"><label>分组名</label><input id="gName" placeholder="如:一组" style="width:80px"></div>
        <div class="f"><label>颜色</label>
          <div class="gcolors" id="gCols">
            <div class="gco c-blue sel" data-c="blue"></div>
            <div class="gco c-green" data-c="green"></div>
            <div class="gco c-orange" data-c="orange"></div>
            <div class="gco c-purple" data-c="purple"></div>
            <div class="gco c-cyan" data-c="cyan"></div>
            <div class="gco c-red" data-c="red"></div>
          </div>
        </div>
        <div class="f" id="l2DepF"><label>依托分组</label><select id="gDepGrp"><option value="">-- 无(独立) --</option></select></div>
        <div class="f" id="l2RelF" style="display:none"><label>关联</label><select id="gDepRel"><option value="AND">AND 交集</option><option value="OR">OR 并集</option></select></div>
        <button class="bp b bsm" id="btnAddGrp">创建分组</button>
      </div>
      <div class="l2-base-info" id="l2BaseInfo" style="display:none"></div>
      <div class="vp2" id="vp2"></div>
      <div class="grp-cards" id="grpCards"></div>
    </div>
  </div>

  <div class="save-bar">
    <button class="bs b bsm" id="btnSave">💾 保存配置</button>
    <button class="b bsm" id="btnLoad">📂 加载配置</button>
    <input type="file" id="cfgIn" accept=".json" style="display:none">
  </div>
</div>

<!-- RESULT VIEW -->
<div id="resultView">
  <div class="rv-hdr">
    <button class="b bsm" id="btnBack">← 返回数据</button>
    <h2>统计结果</h2>
    <div class="sp"></div>
    <button class="bw b bsm" id="exportBtn" style="display:none">📤 导出Excel</button>
    <button class="bp b bsm" id="btnCalc">刷新计算</button>
  </div>
  <div class="rv-body" id="rvBody">
    <div id="resArea"><div style="text-align:center;padding:40px;color:var(--t3)">点击"刷新计算"查看结果</div></div>
  </div>
</div>

<!-- Column manager popup -->
<div class="fd-ov" id="cmOv"></div>
<div class="fd cm-popup" id="cmDd">
  <div class="fd-h"><span class="cn">列管理</span><div class="acts"><button class="b bsm bg" id="cmShowAll">全部显示</button></div></div>
  <div class="cm-list" id="cmList"></div>
  <div class="fd-f"><span class="cnt" id="cmCnt">0/0</span><div style="display:flex;gap:4px"><button class="b bsm bg" id="cmX">关闭</button></div></div>
</div>

<!-- Filter dropdown -->
<div class="fd-ov" id="fdOv"></div>
<div class="fd" id="fdDd">
  <div class="fd-h"><span class="cn" id="fdCn">-</span><div class="acts"><button class="b bsm bg" id="fdAll">全选</button><button class="b bsm bg" id="fdNone">全不选</button></div></div>
  <div class="fd-cas">
    <div class="fd-cas-row"><input type="checkbox" class="fd-cas-cb" id="fdCascade"><label for="fdCascade">依赖前置列过滤</label><select id="fdDepCol" style="display:none"></select></div>
    <div class="fd-cas-info" id="fdCasInfo" style="display:none"></div>
  </div>
  <div class="fd-sort"><label>排序</label><span class="sbtn" data-s="" id="fdSortNone">无</span><span class="sbtn" data-s="asc">↑ 升序</span><span class="sbtn" data-s="desc">↓ 降序</span></div>
  <div class="fd-cond">
    <div class="fd-cond-row"><input type="checkbox" class="cb-on" id="fdCondOn"><label for="fdCondOn">条件筛选</label></div>
    <div class="fd-cond-row" id="fdCondRow" style="display:none">
      <select id="fdCondOp"><option value="eq">等于</option><option value="neq">不等于</option><option value="gt">大于</option><option value="lt">小于</option><option value="gte">≥</option><option value="lte">≤</option><option value="sw">开头是</option><option value="ew">结尾是</option><option value="contains">包含</option></select>
      <input id="fdCondVal" placeholder="输入值...">
    </div>
  </div>
  <div class="fd-s"><input id="fdSe" placeholder="搜索..."></div>
  <div class="fd-list" id="fdL"></div>
  <div class="fd-f"><span class="cnt" id="fdCnt">0/0</span><div style="display:flex;gap:4px"><button class="b bsm bg" id="fdX">取消</button><button class="bp b bsm" id="fdOk">应用</button></div></div>
</div>

<!-- Notif -->
<div class="ntf" id="ntf"></div>

<!-- SheetJS -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
