<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商机数据过滤分析系统</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#080c12;--bg:#0c1018;--bg2:#131a25;--bg3:#1a2332;--bg4:#213048;
  --bd:#263044;--bd2:#3a5070;--t1:#e8f0fa;--t2:#94a8c4;--t3:#587098;
  --ac:#3b82f6;--ac2:#60a5fa;--acg:rgba(59,130,246,.18);
  --ok:#22c55e;--okbg:rgba(34,197,94,.1);--wn:#f59e0b;--wnbg:rgba(245,158,11,.1);
  --err:#ef4444;--errbg:rgba(239,68,68,.1);--cy:#06b6d4;--cybg:rgba(6,182,212,.1);
  --pu:#a78bfa;--pubg:rgba(167,139,250,.1);--or:#fb923c;--orbg:rgba(251,146,60,.1);
  --r:5px;--rl:8px;--sh:0 4px 20px rgba(0,0,0,.5);
  --mf:'JetBrains Mono',monospace;--sf:'Noto Sans SC',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sf);background:var(--bg0);color:var(--t1);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--t3)}

/* HEADER */
.hdr{background:linear-gradient(180deg,var(--bg2),var(--bg));border-bottom:1px solid var(--bd);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.hdr-L{display:flex;align-items:center;gap:10px}
.hdr-ico{width:30px;height:30px;background:linear-gradient(135deg,var(--ac),var(--cy));border-radius:6px;display:flex;align-items:center;justify-content:center;font:700 14px var(--mf);color:#fff}
.hdr h1{font-size:14px;font-weight:700}
.hdr .sub{font-size:9px;color:var(--t3);font-family:var(--mf);letter-spacing:1px}
.hdr-R{display:flex;gap:16px;align-items:center}
.hs{text-align:right}
.hs .v{font:600 15px var(--mf);color:var(--cy)}
.hs .l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}

/* BTNS */
.b{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg3);color:var(--t1);font:500 11px var(--sf);cursor:pointer;transition:all .12s;white-space:nowrap}
.b:hover{background:var(--bg4);border-color:var(--ac)}
.bp{background:var(--ac);border-color:var(--ac);color:#fff}.bp:hover{background:var(--ac2)}
.bd{color:var(--err);border-color:rgba(239,68,68,.3);background:var(--errbg)}.bd:hover{background:var(--err);color:#fff}
.bs{color:var(--ok);border-color:rgba(34,197,94,.3);background:var(--okbg)}.bs:hover{background:var(--ok);color:#fff}
.bw{color:var(--wn);border-color:rgba(245,158,11,.3);background:var(--wnbg)}.bw:hover{background:var(--wn);color:#fff}
.bg{border-color:transparent;background:transparent;color:var(--t2)}.bg:hover{color:var(--t1);background:var(--bg4)}
.bsm{padding:2px 7px;font-size:10px}

/* UPLOAD */
.up-wrap{display:flex;align-items:center;justify-content:center;height:calc(100vh - 48px)}
.up-box{max-width:520px;border:2px dashed var(--bd);border-radius:var(--rl);padding:44px 32px;text-align:center;cursor:pointer;transition:all .3s;background:var(--bg2)}
.up-box:hover{border-color:var(--ac);background:var(--bg3)}
.up-box.drag{border-color:var(--cy);background:rgba(6,182,212,.04)}
.up-box .i{font-size:38px;margin-bottom:12px;display:block}
.up-box .t1{font-size:15px;font-weight:600;margin-bottom:4px}
.up-box .t2{font-size:11px;color:var(--t3)}
#fileInput{display:none}

/* MAIN VIEW */
#mainView{display:none;height:calc(100vh - 48px);flex-direction:column}
#mainView.vis{display:flex}

/* Toolbar */
.tb{display:flex;align-items:center;gap:8px;padding:6px 16px;border-bottom:1px solid var(--bd);background:var(--bg3);flex-shrink:0;flex-wrap:wrap}
.tb .fi{font:12px var(--mf);color:var(--t2)}.tb .fi b{color:var(--t1)}
.tb .sp{flex:1}

/* Table */
.tw{flex:1;overflow:auto;position:relative}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead{position:sticky;top:0;z-index:20}
.tbl th{background:var(--bg3);border-bottom:2px solid var(--bd);padding:0;text-align:left;white-space:nowrap;user-select:none;position:relative;min-width:80px}
.th-inner{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;gap:3px}
.th-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:var(--t2);overflow:hidden;text-overflow:ellipsis}
.th-fbtn{display:flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:3px;font-size:10px;color:var(--t3);cursor:pointer;transition:all .1s;flex-shrink:0}
.th-fbtn:hover{color:var(--t2);background:rgba(255,255,255,.06)}
.th-fbtn.on{color:var(--ac);background:var(--acg)}
/* Sort indicator in header */
.th-sort{display:flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:3px;font-size:9px;color:var(--t3);cursor:pointer;transition:all .1s;flex-shrink:0}
.th-sort:hover{color:var(--t2);background:rgba(255,255,255,.06)}
.th-sort.on{color:var(--ok);background:var(--okbg)}
/* Cascade dependency indicator in header */
.th-dep{font-size:9px;padding:1px 5px;border-radius:3px;cursor:pointer;transition:all .1s;flex-shrink:0;display:flex;align-items:center;gap:2px}
.th-dep.off{color:var(--t3);background:rgba(255,255,255,.04)}
.th-dep.on{color:var(--cy);background:var(--cybg)}
.th-dep .dep-label{font-size:8px;letter-spacing:.3px}
.tbl td{padding:5px 10px;border-bottom:1px solid rgba(38,48,68,.5);font:11px var(--mf);color:var(--t1);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl tbody tr:hover{background:rgba(59,130,246,.04)}
.tbl tbody tr:nth-child(even){background:rgba(255,255,255,.01)}
.tbl tbody tr:nth-child(even):hover{background:rgba(59,130,246,.04)}
.ti{color:var(--t3)!important;font-size:10px!important;width:34px;text-align:center!important}

/* Filter dropdown */
.fd-ov{position:fixed;inset:0;z-index:998;display:none}
.fd-ov.vis{display:block}
.fd{position:absolute;z-index:999;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);min-width:260px;max-width:380px;display:none;flex-direction:column;overflow:hidden}
.fd.vis{display:flex}
.fd-h{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:1px solid var(--bd);background:var(--bg2)}
.fd-h .cn{font-size:12px;font-weight:600}
.fd-h .acts{display:flex;gap:4px}
.fd-s{padding:6px 10px;border-bottom:1px solid var(--bd)}
.fd-s input{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:3px;padding:4px 8px;color:var(--t1);font:11px var(--mf);outline:none}
.fd-s input:focus{border-color:var(--ac)}
.fd-list{overflow-y:auto;flex:1;max-height:220px;padding:2px 0}
.fd-item{display:flex;align-items:center;gap:6px;padding:3px 10px;cursor:pointer;transition:background .08s;font-size:11px}
.fd-item:hover{background:var(--bg4)}
.fd-item input[type=checkbox]{accent-color:var(--ac);width:13px;height:13px;cursor:pointer;flex-shrink:0}
.fd-item .vl{flex:1;font-family:var(--mf);color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fd-item .vc{color:var(--t3);font-size:10px;font-family:var(--mf)}
/* Cascade section inside dropdown */
.fd-cas{padding:8px 10px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:6px;background:var(--bg2)}
.fd-cas-row{display:flex;align-items:center;gap:6px}
.fd-cas-row label{font-size:10px;color:var(--t3)}
.fd-cas-cb{accent-color:var(--cy);width:13px;height:13px;cursor:pointer}
.fd-cas select{background:var(--bg);border:1px solid var(--bd);border-radius:3px;padding:3px 6px;color:var(--t1);font:10px var(--sf);outline:none;flex:1}
.fd-cas select:focus{border-color:var(--cy)}
.fd-cas-info{font-size:9px;color:var(--cy);font-family:var(--mf);line-height:1.4}
/* Sort & condition inside dropdown */
.fd-sort{display:flex;align-items:center;gap:4px;padding:5px 10px;border-bottom:1px solid var(--bd);background:var(--bg2)}
.fd-sort label{font-size:10px;color:var(--t3)}
.fd-sort .sbtn{padding:2px 7px;border:1px solid var(--bd);border-radius:3px;font-size:10px;cursor:pointer;background:var(--bg);color:var(--t2);transition:all .12s;font-family:var(--mf)}
.fd-sort .sbtn:hover{border-color:var(--ac);color:var(--t1)}
.fd-sort .sbtn.on{background:var(--ac);border-color:var(--ac);color:#fff}
.fd-cond{padding:6px 10px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:4px;background:var(--bg2)}
.fd-cond-row{display:flex;align-items:center;gap:4px}
.fd-cond label{font-size:10px;color:var(--t3);white-space:nowrap}
.fd-cond select,.fd-cond input{background:var(--bg);border:1px solid var(--bd);border-radius:3px;padding:3px 6px;color:var(--t1);font:10px var(--sf);outline:none}
.fd-cond select{flex:0 0 auto;min-width:72px}
.fd-cond input{flex:1;min-width:60px;font-family:var(--mf)}
.fd-cond select:focus,.fd-cond input:focus{border-color:var(--ac)}
.fd-cond .cb-on{accent-color:var(--wn)}
.fd-f{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-top:1px solid var(--bd);background:var(--bg2)}
.fd-f .cnt{font-size:10px;color:var(--t3);font-family:var(--mf)}

/* L2 AREA */
.l2-bar{border-top:1px solid var(--bd);background:var(--bg2);flex-shrink:0}
.l2-toggle{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;cursor:pointer;user-select:none}
.l2-toggle h3{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.l2-toggle .arr{transition:transform .2s;font-size:10px;color:var(--t3)}
.l2-toggle.open .arr{transform:rotate(180deg)}
.l2-body{display:none;padding:10px 14px;border-top:1px solid var(--bd)}
.l2-body.open{display:block}

/* L2 form */
.l2-form{display:flex;align-items:flex-end;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.l2-form .f{display:flex;flex-direction:column;gap:2px}
.l2-form .f label{font-size:10px;color:var(--t3)}
.l2-form .f select,.l2-form .f input{background:var(--bg);border:1px solid var(--bd);border-radius:3px;padding:4px 8px;color:var(--t1);font:11px var(--sf);outline:none}
.l2-form .f select:focus,.l2-form .f input:focus{border-color:var(--ac)}

/* L2: base column indicator - showing which L1 filter this group is based on */
.l2-base-info{font-size:10px;color:var(--cy);margin-bottom:6px;padding:4px 8px;background:var(--cybg);border-radius:3px;border:1px solid rgba(6,182,212,.15);display:flex;align-items:center;gap:4px;font-family:var(--mf)}
.l2-base-info .l2-base-val{background:var(--acg);color:var(--ac);padding:1px 5px;border-radius:2px;font-size:9px}

.vp2{display:flex;flex-wrap:wrap;gap:3px;margin:6px 0;max-height:100px;overflow-y:auto}
.vp2-i{padding:2px 7px;border:1px solid var(--bd);border-radius:3px;font:10px var(--mf);cursor:pointer;color:var(--t2);background:var(--bg);transition:all .1s}
.vp2-i:hover{border-color:var(--ac);color:var(--t1)}
.vp2-i.sel{background:var(--ac);border-color:var(--ac);color:#fff}
.vp2-i.grp{opacity:.2;pointer-events:none}
.vp2-i.l1out{opacity:.55;border-style:dashed}
.vp2-i.l1out:hover{opacity:.85;border-color:var(--wn);color:var(--wn)}
.vp2-i.l1out.sel{opacity:1;background:var(--wn);border-color:var(--wn);color:#fff;border-style:solid}

.gcolors{display:flex;gap:4px;margin:4px 0}
.gco{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .1s}
.gco:hover{transform:scale(1.15)}
.gco.sel{border-color:#fff;box-shadow:0 0 0 1px var(--bg)}
.gco.c-blue{background:#3b82f6}.gco.c-green{background:#22c55e}.gco.c-orange{background:#f59e0b}
.gco.c-purple{background:#a78bfa}.gco.c-cyan{background:#06b6d4}.gco.c-red{background:#ef4444}

/* Group cards */
.grp-cards{display:flex;flex-wrap:wrap;gap:6px}
.gc{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:8px 10px;min-width:200px;max-width:300px;transition:border-color .12s}
.gc:hover{border-color:var(--ac)}
.gc-h{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.gc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.gc-n{font-size:11px;font-weight:600;flex:1}
.gc-col{font-size:9px;color:var(--t3);font-family:var(--mf)}
.gc-vs{display:flex;flex-wrap:wrap;gap:2px}
.gc-v{font-size:9px;padding:1px 5px;border-radius:2px;font-family:var(--mf)}
.gc-v.t-blue{background:rgba(59,130,246,.12);color:#5a9cf6;border:1px solid rgba(59,130,246,.2)}
.gc-v.t-green{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.gc-v.t-orange{background:rgba(251,146,60,.12);color:#fb923c;border:1px solid rgba(251,146,60,.2)}
.gc-v.t-purple{background:rgba(167,139,250,.12);color:#c4b5fd;border:1px solid rgba(167,139,250,.2)}
.gc-v.t-cyan{background:rgba(6,182,212,.12);color:#22d3ee;border:1px solid rgba(6,182,212,.2)}
.gc-v.t-red{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.gc-dep{font-size:9px;color:var(--cy);font-family:var(--mf);margin-top:4px;display:flex;align-items:center;gap:3px}
.gc-dep .dep-arrow{color:var(--wn)}
.gc-rel{font-size:9px;padding:1px 4px;border-radius:2px;font-weight:600;font-family:var(--mf)}
.gc-rel.rel-and{background:var(--acg);color:var(--ac)}
.gc-rel.rel-or{background:var(--wnbg);color:var(--wn)}

/* RESULT VIEW */
#resultView{display:none;height:calc(100vh - 48px);flex-direction:column}
#resultView.vis{display:flex}
.rv-hdr{padding:10px 20px;border-bottom:1px solid var(--bd);background:var(--bg2);display:flex;align-items:center;gap:12px;flex-shrink:0}
.rv-hdr h2{font-size:14px;font-weight:700;flex:1}
.rv-body{flex:1;overflow-y:auto;padding:20px}
.rv-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.rv-bar .f{display:flex;align-items:center;gap:4px}
.rv-bar .f label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px}
.rv-bar .f select{background:var(--bg);border:1px solid var(--bd);border-radius:3px;padding:4px 8px;color:var(--t1);font:11px var(--sf);outline:none}
.rv-bar .f select:focus{border-color:var(--ac)}

.rt{width:100%;border-collapse:collapse;font-size:12px}
.rt th{background:var(--bg3);padding:8px 12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);border-bottom:1px solid var(--bd);white-space:nowrap;position:sticky;top:0;z-index:5}
.rt td{padding:7px 12px;border-bottom:1px solid rgba(38,48,68,.35);font-family:var(--mf);font-size:11px}
.rt tbody tr:hover{background:rgba(59,130,246,.04)}
.rt .tot{font-weight:700;border-top:2px solid var(--bd);background:var(--bg3)}
.rt .nc{text-align:right;font-family:var(--mf)}
.rt .cc{display:flex;align-items:center;gap:4px}
.rt .cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.rt .gico{font-size:9px}

.add-col{margin-top:16px;padding:10px;border:1px dashed var(--bd);border-radius:var(--r);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.add-col label{font-size:11px;color:var(--t3)}
.add-col select{background:var(--bg2);border:1px solid var(--bd);border-radius:3px;padding:4px 8px;color:var(--t1);font:11px var(--sf);outline:none}
.actag{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:3px;font:10px var(--mf);background:var(--cybg);color:var(--cy);border:1px solid rgba(6,182,212,.2)}
.actag .rx{cursor:pointer;opacity:.6;font-size:11px}.actag .rx:hover{opacity:1}

.det-sec{margin-top:20px;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.det-hdr{padding:8px 12px;background:var(--bg3);font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;color:var(--cy)}

/* Notif */
.ntf{position:fixed;top:14px;right:14px;z-index:9999;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:8px 16px;font-size:12px;color:var(--t1);box-shadow:var(--sh);transform:translateX(120%);transition:transform .25s}
.ntf.show{transform:translateX(0)}
.ntf.ok{border-left:3px solid var(--ok)}.ntf.err{border-left:3px solid var(--err)}

.save-bar{display:flex;gap:6px;align-items:center;padding:6px 14px;border-top:1px solid var(--bd);background:var(--bg3);flex-shrink:0}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-L">
    <div class="hdr-ico">B</div>
    <div><h1>商机数据过滤分析系统</h1><div class="sub">FILTER · GROUP · ANALYZE</div></div>
  </div>
  <div class="hdr-R" id="hdrR" style="display:none">
    <div class="hs"><div class="v" id="hAll">0</div><div class="l">总行</div></div>
    <div class="hs"><div class="v" id="hFil">0</div><div class="l">筛选后</div></div>
    <div class="hs"><div class="v" id="hCol">0</div><div class="l">列</div></div>
  </div>
</header>

<!-- UPLOAD -->
<div class="up-wrap" id="upWrap">
  <div class="up-box" id="upBox">
    <span class="i">📂</span>
    <div class="t1">上传 Excel 文件</div>
    <div class="t2">拖拽或点击选择 .xlsx / .xls / .csv</div>
    <button class="bp b" style="margin-top:14px">选择文件</button>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
  </div>
</div>

<!-- MAIN VIEW -->
<div id="mainView">
  <div class="tb">
    <div class="fi">📄 <b id="fnD">-</b></div>
    <div class="sp"></div>
    <button class="b bsm bg" id="btnClrL1">清空L1过滤</button>
    <button class="b bsm bg" id="btnClrL2">清空L2分组</button>
    <button class="bp b bsm" id="btnResult">查看统计结果 →</button>
    <button class="b bsm" id="btnReup">重新上传</button>
  </div>

  <div class="tw" id="tw">
    <table class="tbl" id="dtbl">
      <thead id="dth"></thead>
      <tbody id="dtb"></tbody>
    </table>
  </div>

  <!-- L2 AREA -->
  <div class="l2-bar">
    <div class="l2-toggle" id="l2Tog">
      <h3>二级组合 <span style="background:var(--wnbg);color:var(--wn);font-size:9px;padding:1px 6px;border-radius:6px">L2 — 依托一级过滤</span></h3>
      <span class="arr">▼</span>
    </div>
    <div class="l2-body" id="l2Body">
      <div class="l2-form">
        <div class="f"><label>依托列 (L1)</label><select id="gCol"><option value="">-- 选择L1过滤列 --</option></select></div>
        <div class="f"><label>分组名</label><input id="gName" placeholder="如:一组" style="width:80px"></div>
        <div class="f"><label>颜色</label>
          <div class="gcolors" id="gCols">
            <div class="gco c-blue sel" data-c="blue"></div>
            <div class="gco c-green" data-c="green"></div>
            <div class="gco c-orange" data-c="orange"></div>
            <div class="gco c-purple" data-c="purple"></div>
            <div class="gco c-cyan" data-c="cyan"></div>
            <div class="gco c-red" data-c="red"></div>
          </div>
        </div>
        <div class="f" id="l2DepF"><label>依托已有分组</label><select id="gDepGrp"><option value="">-- 无(独立) --</option></select></div>
        <div class="f" id="l2RelF" style="display:none"><label>关联方式</label><select id="gDepRel"><option value="AND">AND 交集</option><option value="OR">OR 并集</option></select></div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script>
// ========== STATE ==========
const S={
  raw:[],hdr:[],fn:'',
  // L1: {col: {checked:null|Set<string>, cascade:false, dependCol:null, sort:null|'asc'|'desc', condOn:false, condOp:'eq', condVal:''}}
  // checked=null => all selected; cascade: whether this col depends on another; dependCol: which col
  l1:{},
  l1Temp:null,  // temporary state while editing filter
  l1EditCol:null,
  // L2
  grps:[],
  gid:0,
  selGColor:'blue',
  selGVals:[],
  // L3
  addedCols:[],
};

const CM={blue:{d:'#3b82f6',t:'t-blue'},green:{d:'#22c55e',t:'t-green'},orange:{d:'#f59e0b',t:'t-orange'},purple:{d:'#a78bfa',t:'t-purple'},cyan:{d:'#06b6d4',t:'t-cyan'},red:{d:'#ef4444',t:'t-red'}};

// ========== UTILS ==========
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function ntf(m,t='ok'){const e=document.getElementById('ntf');e.textContent=m;e.className='ntf '+t+' show';setTimeout(()=>e.classList.remove('show'),2000)}
function uniq(col,data){data=data||S.raw;const s=new Set();data.forEach(r=>s.add(String(r[col]??'')));return[...s].sort()}
function fmtN(n){if(Number.isInteger(n))return n.toLocaleString();return n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}

// ========== CASCADE: get data filtered up to (but not including) a given column, respecting dependency chains ==========
// When col B depends on col A, B's filter values + filter logic only apply within A's filtered subset.
// The overall filter logic is: start from all rows, apply each column's filter in dependency order.

function getDepChain(col){
  // Returns the chain of columns this column depends on (recursive)
  const chain=[];
  let cur=col;
  const visited=new Set();
  while(cur){
    if(visited.has(cur))break; // prevent cycle
    visited.add(cur);
    const f=S.l1[cur];
    if(f&&f.cascade&&f.dependCol){
      chain.unshift(f.dependCol);
      cur=f.dependCol;
    }else break;
  }
  return chain;
}

function getDataFilteredForCol(col){
  // Get data filtered by all columns that col depends on (its dependency chain)
  const chain=getDepChain(col);
  let data=S.raw;
  for(const c of chain){
    const f=S.l1[c];
    if(f&&f.checked&&f.checked.size<uniq(c).length){
      data=data.filter(r=>f.checked.has(String(r[c]??'')));
    }
  }
  return data;
}

function getFilteredData(){
  // L1 only
  const order=[];
  const visited=new Set();
  const visiting=new Set();
  function visit(col){
    if(visited.has(col))return;
    if(visiting.has(col))return;
    visiting.add(col);
    const f=S.l1[col];
    if(f&&f.cascade&&f.dependCol)visit(f.dependCol);
    visiting.delete(col);
    visited.add(col);
    order.push(col);
  }
  S.hdr.forEach(c=>visit(c));

  let data=S.raw;
  for(const col of order){
    const f=S.l1[col];
    // Checkbox filter
    if(f&&f.checked&&f.checked.size<uniq(col).length){
      data=data.filter(r=>f.checked.has(String(r[col]??'')));
    }
    // Condition filter
    if(f&&f.condOn&&f.condVal!==''){
      const cv=f.condVal.toLowerCase();
      const op=f.condOp;
      data=data.filter(r=>{
        const v=String(r[col]??'');
        const vl=v.toLowerCase();
        const numV=parseFloat(v);
        const numC=parseFloat(f.condVal);
        switch(op){
          case 'eq': return vl===cv;
          case 'neq': return vl!==cv;
          case 'gt': return !isNaN(numV)&&!isNaN(numC)&&numV>numC;
          case 'lt': return !isNaN(numV)&&!isNaN(numC)&&numV<numC;
          case 'gte': return !isNaN(numV)&&!isNaN(numC)&&numV>=numC;
          case 'lte': return !isNaN(numV)&&!isNaN(numC)&&numV<=numC;
          case 'sw': return vl.startsWith(cv);
          case 'ew': return vl.endsWith(cv);
          case 'contains': return vl.includes(cv);
          default: return true;
        }
      });
    }
  }
  return data;
}

// Sort data by a column
function getSortedData(data){
  // Find the first column with sort set
  for(const col of S.hdr){
    const f=S.l1[col];
    if(f&&f.sort){
      const dir=f.sort==='asc'?1:-1;
      return [...data].sort((a,b)=>{
        const va=a[col]??'', vb=b[col]??'';
        // Try numeric sort first
        const na=parseFloat(va), nb=parseFloat(vb);
        if(!isNaN(na)&&!isNaN(nb)) return (na-nb)*dir;
        return String(va).localeCompare(String(vb),'zh-CN')*dir;
      });
    }
  }
  return data;
}

// Apply L2 group filter on top of L1 data (only for L3 statistics)
function getL2FilteredData(){
  // Not used for table filtering — only for backward compat
  return getFilteredData();
}

// For a given group, compute its "context data" based on dependency chain
// Independent: L1 data
// AND parent: context = parent context ∩ self values
// OR parent: context = (parent context matching self) ∪ (self in L1 data)
function getGroupContext(gid, l1Data, cache){
  if(cache[gid]) return cache[gid];
  const g=S.grps.find(x=>x.id===gid);
  let ctx;
  if(!g.parentId){
    // Independent: rows in L1 data that match this group's values
    ctx=l1Data.filter(r=>g.values.includes(String(r[g.column]??'')));
  } else {
    const parentCtx=getGroupContext(g.parentId, l1Data, cache);
    // selfMatch = rows in L1 that match this group's values
    const selfMatch=l1Data.filter(r=>g.values.includes(String(r[g.column]??'')));
    if(g.parentRel==='AND'){
      // AND: intersection of parent context and self match
      const parentSet=new Set(parentCtx);
      ctx=selfMatch.filter(r=>parentSet.has(r));
    } else {
      // OR: union of parent context and self match
      const seen=new Set();
      ctx=[];
      [...parentCtx,...selfMatch].forEach(r=>{
        if(!seen.has(r)){seen.add(r);ctx.push(r)}
      });
    }
  }
  cache[gid]=ctx;
  return ctx;
}

const upBox=document.getElementById('upBox'),fIn=document.getElementById('fileInput');
upBox.addEventListener('click',()=>fIn.click());
upBox.addEventListener('dragover',e=>{e.preventDefault();upBox.classList.add('drag')});
upBox.addEventListener('dragleave',()=>upBox.classList.remove('drag'));
upBox.addEventListener('drop',e=>{e.preventDefault();upBox.classList.remove('drag');if(e.dataTransfer.files.length)loadFile(e.dataTransfer.files[0])});

function loadFile(file){
  const ext=file.name.split('.').pop().toLowerCase();
  if(!['xlsx','xls','csv'].includes(ext)){ntf('不支持该格式','err');return}
  S.fn=file.name;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!json.length){ntf('文件为空','err');return}
      S.raw=json;S.hdr=Object.keys(json[0]);S.l1={};S.grps=[];S.gid=0;S.addedCols=[];
      S.hdr.forEach(c=>{S.l1[c]={checked:null,cascade:false,dependCol:null,sort:null,condOn:false,condOp:'eq',condVal:''}});
      initApp();ntf(`已加载 ${json.length} 行 × ${S.hdr.length} 列`);
    }catch(err){ntf('解析失败','err')}
  };
  reader.readAsArrayBuffer(file);
}

function initApp(){
  document.getElementById('upWrap').style.display='none';
  document.getElementById('mainView').classList.add('vis');
  document.getElementById('hdrR').style.display='flex';
  document.getElementById('fnD').textContent=S.fn;
  renderTable();updHdr();popGCol();popSumCol();
}

function updHdr(){
  const f=getFilteredData();
  document.getElementById('hAll').textContent=S.raw.length;
  document.getElementById('hFil').textContent=f.length;
  document.getElementById('hCol').textContent=S.hdr.length;
}

// ========== TABLE + L1 FILTERS IN HEADER ==========
function renderTable(){
  const thead=document.getElementById('dth'),tbody=document.getElementById('dtb');
  const data=getSortedData(getFilteredData());
  let hh='<tr><th style="width:34px"><div class="th-inner"><span class="th-name">#</span></div></th>';
  S.hdr.forEach(col=>{
    const f=S.l1[col];
    const isActive=f&&f.checked&&f.checked.size<uniq(col).length;
    const isCascade=f&&f.cascade;
    const dependLabel=isCascade&&f.dependCol?`→ ${f.dependCol}`:'';
    const isSort=f&&f.sort;
    const sortIcon=isSort==='asc'?'▲':isSort==='desc'?'▼':'⇅';
    const hasCond=f&&f.condOn&&f.condVal!=='';
    hh+=`<th data-col="${esc(col)}">
      <div class="th-inner">
        <span class="th-name">${esc(col)}${hasCond?' *':''}</span>
        ${isCascade?`<span class="th-dep on" data-col="${esc(col)}" title="级联依赖: ${esc(f.dependCol)}">${dependLabel}</span>`:`<span class="th-dep off" data-col="${esc(col)}" title="无依赖">○</span>`}
        <span class="th-fbtn ${isActive?'on':''}" data-col="${esc(col)}" title="过滤">▾</span>
        <span class="th-sort ${isSort?'on':''}" data-col="${esc(col)}" title="${hasCond?`条件: ${f.condOp} ${f.condVal} | `:''}排序">${sortIcon}</span>
      </div>
    </th>`;
  });
  hh+='</tr>';thead.innerHTML=hh;

  let bb='';
  data.forEach((r,i)=>{
    bb+=`<tr><td class="ti">${i+1}</td>`;
    S.hdr.forEach(c=>{bb+=`<td title="${esc(String(r[c]??''))}">${esc(String(r[c]??''))}</td>`});
    bb+='</tr>';
  });
  tbody.innerHTML=bb;

  thead.querySelectorAll('.th-fbtn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();openFD(b.dataset.col,b)}));
  thead.querySelectorAll('.th-dep').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();openFD(b.dataset.col,b,true);
  }));
  // Sort: click to cycle asc→desc→none
  thead.querySelectorAll('.th-sort').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    const col=b.dataset.col;
    const f=S.l1[col];
    // Clear all other sorts (only one sort at a time)
    S.hdr.forEach(c=>{if(c!==col)S.l1[c].sort=null});
    if(!f.sort) f.sort='asc';
    else if(f.sort==='asc') f.sort='desc';
    else f.sort=null;
    renderTable();updHdr();
  }));
}

// ========== FILTER DROPDOWN ==========
const fdOv=document.getElementById('fdOv'),fdDd=document.getElementById('fdDd'),fdL=document.getElementById('fdL');

function openFD(col,anchor,focusCascade=false){
  S.l1EditCol=col;
  document.getElementById('fdCn').textContent=col;
  document.getElementById('fdSe').value='';

  const f=S.l1[col];
  // Cascade section
  const casCb=document.getElementById('fdCascade');
  const depSel=document.getElementById('fdDepCol');
  const casInfo=document.getElementById('fdCasInfo');
  casCb.checked=f.cascade||false;

  // Populate depend col options (columns before this one)
  const colIdx=S.hdr.indexOf(col);
  depSel.innerHTML='<option value="">-- 选择依赖列 --</option>';
  for(let i=0;i<colIdx;i++){
    depSel.innerHTML+=`<option value="${esc(S.hdr[i])}">${esc(S.hdr[i])}</option>`;
  }
  depSel.value=f.dependCol||'';
  depSel.style.display=casCb.checked?'block':'none';
  updateCasInfo();

  // Get values based on current cascade setting
  const baseData=f.cascade&&f.dependCol?getDataFilteredForCol(col):S.raw;
  const valSet=new Set();baseData.forEach(r=>valSet.add(String(r[col]??'')));
  const vals=[...valSet].sort();

  // Current checked
  S.l1Temp={checked:new Map(),cascade:f.cascade,dependCol:f.dependCol,sort:f.sort||null,condOn:f.condOn||false,condOp:f.condOp||'eq',condVal:f.condVal||''};
  // For non-cascaded: all unique values from entire dataset
  const allVals=uniq(col);
  allVals.forEach(v=>{
    const isInScope=vals.includes(v);
    const currentChecked=f.checked?f.checked.has(v):true;
    S.l1Temp.checked.set(v,isInScope?currentChecked:false);
  });

  // Init sort buttons
  document.querySelectorAll('.fd-sort .sbtn').forEach(b=>b.classList.toggle('on',b.dataset.s===(S.l1Temp.sort||'')));

  // Init condition
  const condCb=document.getElementById('fdCondOn');
  const condRow=document.getElementById('fdCondRow');
  const condOp=document.getElementById('fdCondOp');
  const condVal=document.getElementById('fdCondVal');
  condCb.checked=S.l1Temp.condOn;
  condRow.style.display=S.l1Temp.condOn?'flex':'none';
  condOp.value=S.l1Temp.condOp;
  condVal.value=S.l1Temp.condVal;

  renderFDList('');

  // Position
  const rect=anchor.closest('th').getBoundingClientRect();
  let left=rect.left, top=rect.bottom+2;
  const ddW=300;
  if(left+ddW>window.innerWidth)left=window.innerWidth-ddW-8;
  if(top+440>window.innerHeight)top=rect.top-440;
  fdDd.style.left=left+'px';fdDd.style.top=top+'px';fdDd.style.width=ddW+'px';
  fdOv.classList.add('vis');fdDd.classList.add('vis');

  if(focusCascade){casCb.focus()}else{document.getElementById('fdSe').focus()}
}

function updateCasInfo(){
  const casInfo=document.getElementById('fdCasInfo');
  const casCb=document.getElementById('fdCascade');
  const depSel=document.getElementById('fdDepCol');
  if(casCb.checked&&depSel.value){
    const depCol=depSel.value;
    const depF=S.l1[depCol];
    const isFiltered=depF&&depF.checked&&depF.checked.size<uniq(depCol).length;
    const vals=isFiltered?[...depF.checked]:uniq(depCol);
    casInfo.innerHTML=`依赖 <b>${esc(depCol)}</b> 的过滤结果 (${isFiltered?'已过滤':'未过滤'}: ${vals.slice(0,5).map(v=>esc(v)).join(',')}${vals.length>5?'...':''})`;
    casInfo.style.display='block';
  }else{
    casInfo.innerHTML='开启后，此列的候选值和过滤范围将限定在所依赖列的过滤结果内';
    casInfo.style.display=casCb.checked?'block':'none';
  }
}

casCb=document.getElementById('fdCascade');
casCb.addEventListener('change',()=>{
  const depSel=document.getElementById('fdDepCol');
  depSel.style.display=casCb.checked?'block':'none';
  if(!casCb.checked)depSel.value='';
  updateCasInfo();
  // Recompute available values
  recomputeFDVals();
});

document.getElementById('fdDepCol').addEventListener('change',()=>{
  updateCasInfo();
  recomputeFDVals();
});

// Sort buttons
document.querySelectorAll('.fd-sort .sbtn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.fd-sort .sbtn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    S.l1Temp.sort=b.dataset.s||null;
  });
});

// Condition filter
document.getElementById('fdCondOn').addEventListener('change',e=>{
  S.l1Temp.condOn=e.target.checked;
  document.getElementById('fdCondRow').style.display=e.target.checked?'flex':'none';
});
document.getElementById('fdCondOp').addEventListener('change',e=>{S.l1Temp.condOp=e.target.value});
document.getElementById('fdCondVal').addEventListener('input',e=>{S.l1Temp.condVal=e.target.value});

function recomputeFDVals(){
  const col=S.l1EditCol;
  const cascade=document.getElementById('fdCascade').checked;
  const dependCol=document.getElementById('fdDepCol').value;

  const baseData=cascade&&dependCol?getDataFilteredForCol(col):S.raw;
  const valSet=new Set();baseData.forEach(r=>valSet.add(String(r[col]??'')));
  const scopedVals=[...valSet].sort();
  const allVals=uniq(col);

  // Recompute checked: values in scope default to true, out of scope forced false
  const newChecked=new Map();
  allVals.forEach(v=>{
    const isInScope=scopedVals.includes(v);
    newChecked.set(v,isInScope);
  });
  S.l1Temp.checked=newChecked;
  S.l1Temp.cascade=cascade;
  S.l1Temp.dependCol=cascade?dependCol:null;
  renderFDList(document.getElementById('fdSe').value);
}

function renderFDList(search){
  const col=S.l1EditCol;
  const allVals=uniq(col);
  const cascade=S.l1Temp.cascade;
  const dependCol=S.l1Temp.dependCol;

  // Determine which values are in scope
  const baseData=cascade&&dependCol?getDataFilteredForCol(col):S.raw;
  const scopeSet=new Set();baseData.forEach(r=>scopeSet.add(String(r[col]??'')));

  let displayVals=allVals;
  if(search)displayVals=displayVals.filter(v=>v.toLowerCase().includes(search.toLowerCase()));

  const checkedCount=[...S.l1Temp.checked.entries()].filter(([k,v])=>v).length;
  const scopeCount=[...scopeSet].length;
  document.getElementById('fdCnt').textContent=`${checkedCount}/${allVals.length} 项${cascade&&dependCol?` (依赖${dependCol}: ${scopeCount}个可选)`:''}`;

  let html='';
  displayVals.forEach(v=>{
    const inScope=scopeSet.has(v);
    const cnt=inScope?baseData.filter(r=>String(r[col]??'')===v).length:0;
    const ck=S.l1Temp.checked.get(v)?'checked':'';
    html+=`<div class="fd-item ${!inScope?'l1only':''}" data-v="${esc(v)}" style="${!inScope?'opacity:.35':''}">
      <input type="checkbox" ${ck} ${!inScope?'disabled':''}>
      <span class="vl">${esc(v)}${!inScope?' (不在范围内)':''}</span>
      <span class="vc">${cnt}</span>
    </div>`;
  });
  fdL.innerHTML=html;

  fdL.querySelectorAll('.fd-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const cb=item.querySelector('input');
      if(cb.disabled)return;
      cb.checked=!cb.checked;
      S.l1Temp.checked.set(item.dataset.v,cb.checked);
      const cc=[...S.l1Temp.checked.entries()].filter(([k,v])=>v).length;
      const sc=[...scopeSet].length;
      document.getElementById('fdCnt').textContent=`${cc}/${allVals.length} 项${cascade&&dependCol?` (依赖${dependCol}: ${sc}个可选)`:''}`;
    });
  });
}

function showL2BaseInfo(col){
  const info=document.getElementById('l2BaseInfo');
  const f=S.l1[col];
  const isActive=f&&f.checked&&f.checked.size<uniq(col).length;
  const filteredVals=isActive?[...f.checked]:uniq(col);
  const filteredData=getFilteredData();
  const dataVals=uniq(col,filteredData);

  let html=`依托列: <b>${esc(col)}</b> `;
  if(isActive){
    html+=`L1已过滤 (${filteredVals.length}/${uniq(col).length}个值), 筛选后剩余 ${dataVals.length} 个值`;
  }else{
    html+=`L1未过滤 (全部${filteredVals.length}个值)`;
  }
  html+=`<br><span style="color:var(--t3)">虚线框 = L1范围外的值，仍可组合进分组</span>`;
  info.innerHTML=html;
  info.style.display='block';
}

function renderVP2(col){
  const pk=document.getElementById('vp2');
  // L1过滤后的数据中该列唯一值（在范围内的值）
  const filteredData=getFilteredData();
  const inScopeVals=uniq(col,filteredData);
  const inScopeSet=new Set(inScopeVals);

  // 全量值
  const allVals=uniq(col);

  // 已被分组的值
  const grouped=new Set();
  S.grps.forEach(g=>{if(g.column===col)g.values.forEach(v=>grouped.add(String(v)))});

  let html='';
  // 先显示范围内的值，再显示范围外的值
  const inScope=allVals.filter(v=>inScopeSet.has(v));
  const outScope=allVals.filter(v=>!inScopeSet.has(v));

  [...inScope,...outScope].forEach(v=>{
    const isGrouped=grouped.has(v);
    const isInScope=inScopeSet.has(v);
    const isSel=S.selGVals.includes(v);
    let cls='vp2-i';
    if(isSel)cls+=' sel';
    if(isGrouped)cls+=' grp';
    if(!isInScope)cls+=' l1out';
    const label=!isInScope?`${v} (L1外)`:v;
    html+=`<div class="${cls}" data-v="${esc(v)}" title="${!isInScope?'L1范围外，仍可组合进分组':''}">${esc(label)}</div>`;
  });
  pk.innerHTML=html;

  // 所有非已分组的值都可点击（包括L1范围外的）
  pk.querySelectorAll('.vp2-i:not(.grp)').forEach(el=>{
    el.addEventListener('click',()=>{
      const v=el.dataset.v;
      if(S.selGVals.includes(v)){S.selGVals=S.selGVals.filter(x=>x!==v);el.classList.remove('sel')}
      else{S.selGVals.push(v);el.classList.add('sel')}
    });
  });
}

document.querySelectorAll('.gco').forEach(o=>o.addEventListener('click',()=>{

}));

document.getElementById('btnAddGrp').addEventListener('click',()=>{
  const col=document.getElementById('gCol').value;
  const name=document.getElementById('gName').value.trim();
  const parentGroupId=document.getElementById('gDepGrp').value;
  const parentRel=document.getElementById('gDepRel').value;
  if(!col){ntf('请选择依托的L1列','err');return}
  if(!name){ntf('请输入分组名','err');return}
  if(!S.selGVals.length){ntf('请选择值','err');return}
  // Prevent circular dependency
  const f=S.l1[col];
  const isActive=f&&f.checked&&f.checked.size<uniq(col).length;
  const newGrp={
    id:++S.gid,name,color:S.selGColor,column:col,values:[...S.selGVals],
    l1Dep:{col,cascade:f.cascade,dependCol:f.dependCol,filtered:isActive},
    parentId:parentGroupId?+parentGroupId:null,
    parentRel:parentGroupId?parentRel:null
  };
  // Check circular: parent should not be a descendant of this new group (impossible for new, but check self & chain)
  if(parentGroupId){
    let cur=+parentGroupId;
    while(cur){
      if(cur===newGrp.id){ntf('不能形成循环依赖','err');return}
      const pg=S.grps.find(g=>g.id===cur);
      cur=pg&&pg.parentId?pg.parentId:null;
    }
  }
  S.grps.push(newGrp);
  S.selGVals=[];document.getElementById('gName').value='';
  renderVP2(col);renderGrpCards();popDepGrp();
  const depMsg=parentGroupId?` → ${parentRel} ${S.grps.find(g=>g.id===+parentGroupId)?.name||''}`:'';
  ntf(`分组 "${name}" 已创建 (L1:${col}${depMsg})`);
});

function renderGrpCards(){
  const div=document.getElementById('grpCards');
  if(!S.grps.length){div.innerHTML='';return}
  let html='';
  S.grps.forEach(g=>{
    const cm=CM[g.color]||CM.blue;
    const l1Info=g.l1Dep?`L1:${esc(g.l1Dep.col)}`:''; 
    // Find parent group name
    let depHtml='';
    if(g.parentId){
      const pg=S.grps.find(x=>x.id===g.parentId);
      if(pg){
        const relCls=g.parentRel==='AND'?'rel-and':'rel-or';
        depHtml=`<div class="gc-dep"><span class="dep-arrow">↑</span> <span class="gc-rel ${relCls}">${g.parentRel}</span> ${esc(pg.name)} (${esc(pg.column)})</div>`;
      }
    }
    // Find children
    const children=S.grps.filter(x=>x.parentId===g.id);
    let childHtml='';
    if(children.length){
      childHtml='<div class="gc-dep"><span style="color:var(--t3)">↓</span> ';
      childHtml+=children.map(c=>{
        const relCls=c.parentRel==='AND'?'rel-and':'rel-or';
        return `<span class="gc-rel ${relCls}">${c.parentRel}</span> ${esc(c.name)}`;
      }).join(' · ');
      childHtml+='</div>';
    }
    html+=`<div class="gc">
      <div class="gc-h">
        <span class="gc-dot" style="background:${cm.d}"></span>
        <span class="gc-n">${esc(g.name)}</span>
        <span class="gc-col">${esc(g.column)} ${l1Info}</span>
        <button class="bd b bsm" data-del="${g.id}">✕</button>
      </div>
      <div class="gc-vs">${g.values.map(v=>`<span class="gc-v ${cm.t}">${esc(v)}</span>`).join('')}</div>
      ${depHtml}${childHtml}
    </div>`;
  });
  div.innerHTML=html;
  div.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{
    const delId=+b.dataset.del;
    // Also clear children's parentId
    S.grps.forEach(g=>{if(g.parentId===delId)g.parentId=null});
    S.grps=S.grps.filter(g=>g.id!==delId);
    const col=document.getElementById('gCol').value;if(col){renderVP2(col);showL2BaseInfo(col)}
    renderGrpCards();popDepGrp();ntf('分组已删除');
  }));
}

document.getElementById('btnClrL2').addEventListener('click',()=>{
  S.grps=[];S.gid=0;renderGrpCards();popDepGrp();
  const col=document.getElementById('gCol').value;if(col){renderVP2(col);showL2BaseInfo(col)}
  ntf('二级分组已清空');
});

function calcL3(){
  const sumCol=document.getElementById('sumCol').value;
  const l1Data=getFilteredData(); // L1 only as base
  const resArea=document.getElementById('resArea');

  const entries=[];
  const groupedValsByCol={};
  S.grps.forEach(g=>{
    if(!groupedValsByCol[g.column])groupedValsByCol[g.column]=new Set();
    g.values.forEach(v=>groupedValsByCol[g.column].add(String(v)));
  });

  // Compute each group's context independently
  const ctxCache={};

  S.grps.forEach(g=>{
    const ctx=getGroupContext(g.id, l1Data, ctxCache);
    // Build dependency label
    let depLabel=g.l1Dep?`L1:${g.l1Dep.col}`:'';
    if(g.parentId){
      const pg=S.grps.find(x=>x.id===g.parentId);
      if(pg) depLabel+=` ${g.parentRel}→${pg.name}`;
    } else {
      depLabel+=' (独立)';
    }
    const entry={name:g.name,color:g.color,isGroup:true,column:g.column,count:ctx.length,
      pct:l1Data.length>0?(ctx.length/l1Data.length*100).toFixed(1):'0',
      depInfo:depLabel};
    if(sumCol)entry.sum=ctx.reduce((a,r)=>a+(parseFloat(r[sumCol])||0),0);
    S.addedCols.forEach(ac=>{
      const tc={};ctx.forEach(r=>{const v=String(r[ac]??'');tc[v]=(tc[v]||0)+1});entry['ac_'+ac]=tc;
    });
    entries.push(entry);
  });

  // No groups → prompt to create
  if(!S.grps.length){
    resArea.innerHTML='<div style="text-align:center;padding:40px;color:var(--t3)">请先在二级组合中创建分组</div>';
    document.getElementById('addColArea').style.display='none';
    return;
  }

  // Compute total from all groups (union of all group contexts to avoid double-counting)
  const allGroupRows=new Set();
  S.grps.forEach(g=>{
    const ctx=getGroupContext(g.id, l1Data, ctxCache);
    ctx.forEach(r=>allGroupRows.add(r));
  });
  const totalRows=[...allGroupRows];
  const total={name:'合计',isTotal:true,count:totalRows.length,pct:l1Data.length>0?(totalRows.length/l1Data.length*100).toFixed(1):'0',
    sum:sumCol?totalRows.reduce((a,r)=>a+(parseFloat(r[sumCol])||0),0):null};
  S.addedCols.forEach(ac=>{
    const tc={};totalRows.forEach(r=>{const v=String(r[ac]??'');tc[v]=(tc[v]||0)+1});total['ac_'+ac]=tc;
  });

  // Render
  let html='<table class="rt"><thead><tr>';
  html+='<th>类别</th><th>依托</th><th>列</th><th style="text-align:right">数量</th><th style="text-align:right">占比</th>';
  if(sumCol)html+=`<th style="text-align:right">${esc(sumCol)} 求和</th>`;
  S.addedCols.forEach(ac=>html+=`<th style="text-align:right">${esc(ac)} 类型数</th>`);
  html+='</tr></thead><tbody>';

  entries.forEach(e=>{
    const cm=e.color?CM[e.color]:null;
    html+='<tr>';
    html+=`<td><div class="cc">`;
    if(cm)html+=`<span class="cdot" style="background:${cm.d}"></span>`;
    html+=`<span class="gico">${e.isGroup?'📁':'📌'}</span> ${esc(e.name)}</div></td>`;
    html+=`<td style="color:var(--cy);font-size:10px;font-family:var(--mf)">${esc(e.depInfo)}</td>`;
    html+=`<td style="color:var(--t3);font-size:10px">${esc(e.column||'')}</td>`;
    html+=`<td class="nc">${e.count}</td>`;
    html+=`<td class="nc">${e.pct}%</td>`;
    if(sumCol)html+=`<td class="nc" style="color:var(--wn)">${e.sum!==undefined?fmtN(e.sum):'-'}</td>`;
    S.addedCols.forEach(ac=>{
      const tc=e['ac_'+ac]||{};
      html+=`<td class="nc" style="color:var(--cy)">${Object.keys(tc).length} 种</td>`;
    });
    html+='</tr>';
  });

  html+=`<tr class="tot"><td>合计</td><td></td><td></td><td class="nc">${total.count}</td><td class="nc">100%</td>`;
  if(sumCol)html+=`<td class="nc" style="color:var(--wn)">${fmtN(total.sum)}</td>`;
  S.addedCols.forEach(ac=>{
    const tc=total['ac_'+ac]||{};
    html+=`<td class="nc" style="color:var(--cy)">${Object.keys(tc).length} 种</td>`;
  });
  html+='</tr></tbody></table>';

  if(S.addedCols.length){
    S.addedCols.forEach(ac=>{
      html+=`<div class="det-sec"><div class="det-hdr">🎨 ${esc(ac)} 详细分布</div><table class="rt"><thead><tr><th>类别</th><th>${esc(ac)} 值</th><th style="text-align:right">数量</th></tr></thead><tbody>`;
      entries.forEach(e=>{
        const tc=e['ac_'+ac]||{};
        const sorted=Object.entries(tc).sort((a,b)=>b[1]-a[1]);
        if(!sorted.length){html+=`<tr><td style="font-weight:600">${esc(e.name)}</td><td>-</td><td class="nc">0</td></tr>`;return}
        sorted.forEach(([val,cnt],i)=>{
          html+='<tr>';
          if(i===0)html+=`<td rowspan="${sorted.length}" style="font-weight:600;vertical-align:top">${esc(e.name)}</td>`;
          html+=`<td style="font-family:var(--mf);font-size:11px">${esc(val)}</td><td class="nc">${cnt}</td></tr>`;
        });
      });
      html+='</tbody></table></div>';
    });
  }

  resArea.innerHTML=html;
  document.getElementById('addColArea').style.display='flex';
  popAddCol();
  ntf('统计完成');
}

function popAddCol(){
  const sel=document.getElementById('addColSel');
  sel.innerHTML='<option value="">-- 选择列 --</option>';
  S.hdr.forEach(c=>{if(!S.addedCols.includes(c))sel.innerHTML+=`<option value="${esc(c)}">${esc(c)}</option>`});
  renderACTags();
}

function renderACTags(){
  const div=document.getElementById('acTags');
  div.innerHTML=S.addedCols.map(c=>`<span class="actag">${esc(c)}<span class="rx" data-c="${esc(c)}">✕</span></span>`).join('');
  div.querySelectorAll('.rx').forEach(el=>el.addEventListener('click',()=>{
    S.addedCols=S.addedCols.filter(c=>c!==el.dataset.c);renderACTags();popAddCol();calcL3();
  }));
}

document.getElementById('addColSel').addEventListener('change',e=>{
  const col=e.target.value;if(col&&!S.addedCols.includes(col)){S.addedCols.push(col);renderACTags();popAddCol();calcL3()}
  e.target.value='';
});

// ========== SAVE / LOAD ==========
document.getElementById('btnSave').addEventListener('click',()=>{
  const cfg={fileName:S.fn,l1:{},groups:S.grps.map(g=>({name:g.name,color:g.color,column:g.column,values:g.values,l1Dep:g.l1Dep,parentId:g.parentId,parentRel:g.parentRel})),addedCols:S.addedCols,sumCol:document.getElementById('sumCol').value};
  for(const col in S.l1){
    const f=S.l1[col];
    cfg.l1[col]={checked:f.checked?[...f.checked]:null,cascade:f.cascade||false,dependCol:f.dependCol||null,sort:f.sort||null,condOn:f.condOn||false,condOp:f.condOp||'eq',condVal:f.condVal||''};
  }
  const blob=new Blob([JSON.stringify(cfg,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='filter_config.json';a.click();
  URL.revokeObjectURL(url);ntf('配置已保存');
});

document.getElementById('btnLoad').addEventListener('click',()=>document.getElementById('cfgIn').click());

document.getElementById('cfgIn').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const cfg=JSON.parse(ev.target.result);
      S.l1={};
      for(const col in cfg.l1){
        const f=cfg.l1[col];
        S.l1[col]={checked:f.checked?new Set(f.checked):null,cascade:f.cascade||false,dependCol:f.dependCol||null,sort:f.sort||null,condOn:f.condOn||false,condOp:f.condOp||'eq',condVal:f.condVal||''};
      }
      S.grps=[];S.gid=0;
      if(cfg.groups)cfg.groups.forEach(g=>{S.grps.push({id:++S.gid,name:g.name,color:g.color,column:g.column,values:g.values,l1Dep:g.l1Dep||null,parentId:g.parentId||null,parentRel:g.parentRel||null})});
      S.addedCols=cfg.addedCols||[];
      if(cfg.sumCol){popSumCol();document.getElementById('sumCol').value=cfg.sumCol}
      renderTable();updHdr();popGCol();
      const col=document.getElementById('gCol').value;if(col){renderVP2(col);showL2BaseInfo(col)}
      renderGrpCards();ntf('配置已加载');
    }catch(err){ntf('配置文件格式错误','err')}
  };
  reader.readAsText(file);e.target.value='';
});
</script>
