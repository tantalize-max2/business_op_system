<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商机拆表工具</title>
<style>
:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #252834;
  --border: #333645;
  --text: #e8e9ed;
  --text2: #9ca0ad;
  --accent: #4f7df5;
  --accent2: #6c8ff8;
  --green: #34c759;
  --red: #ff453a;
  --orange: #ff9f0a;
  --radius: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Layout */
.layout { display: flex; height: 100vh; }
.sidebar {
  width: 220px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-logo {
  padding: 20px;
  font-size: 16px;
  font-weight: 700;
  border-bottom: 1px solid var(--border);
  color: var(--accent);
  letter-spacing: 1px;
}
.sidebar-nav { flex: 1; padding: 12px 0; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 20px;
  cursor: pointer;
  color: var(--text2);
  font-size: 14px;
  transition: all 0.2s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active {
  background: rgba(79,125,245,0.1);
  color: var(--accent);
  border-left-color: var(--accent);
}
.nav-icon { font-size: 18px; width: 24px; text-align: center; }

.main { flex: 1; overflow-y: auto; padding: 32px 40px; }

/* Panels */
.panel { display: none; }
.panel.active { display: block; }

/* Common */
h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.subtitle { color: var(--text2); font-size: 14px; margin-bottom: 24px; }
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
}
.card-title {
  font-size: 15px; font-weight: 600; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.badge {
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}
.btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-outline {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { opacity: 0.85; }
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-group { display: flex; gap: 10px; margin-top: 16px; }

/* Upload */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 48px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
}
.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--accent);
  background: rgba(79,125,245,0.05);
}
.upload-icon { font-size: 42px; margin-bottom: 12px; }
.upload-text { color: var(--text2); font-size: 14px; }
.upload-text em { color: var(--accent); font-style: normal; }
.upload-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
}
.file-info {
  display: flex; align-items: center; gap: 12px;
  margin-top: 16px; padding: 14px 16px;
  background: var(--bg3); border-radius: 8px;
}
.file-info .icon { font-size: 28px; }
.file-info .name { font-weight: 600; font-size: 14px; }
.file-info .meta { color: var(--text2); font-size: 12px; margin-top: 2px; }
.file-info .remove {
  margin-left: auto; color: var(--text2); cursor: pointer;
  font-size: 20px; transition: color 0.2s;
}
.file-info .remove:hover { color: var(--red); }

/* Mapping */
.bureau-list { display: flex; flex-direction: column; gap: 12px; }
.bureau-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.bureau-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
}
.bureau-header:hover { background: rgba(79,125,245,0.05); }
.bureau-name { font-weight: 600; font-size: 14px; }
.bureau-count { color: var(--text2); font-size: 12px; }
.bureau-actions { display: flex; gap: 8px; }
.bureau-body { padding: 0 18px 14px; display: none; }
.bureau-card.open .bureau-body { display: block; }
.bureau-card.open .arrow { transform: rotate(90deg); }
.arrow { font-size: 12px; transition: transform 0.2s; color: var(--text2); }

.manager-tags {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 4px 0;
}
.manager-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 13px;
  transition: all 0.2s;
}
.manager-tag:hover { border-color: var(--red); }
.manager-tag .x {
  cursor: pointer; color: var(--text2); font-size: 14px; margin-left: 2px;
}
.manager-tag .x:hover { color: var(--red); }
.add-person-row {
  display: flex; gap: 8px; margin-top: 10px;
}
.add-person-row input {
  flex: 1; padding: 7px 12px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text); font-size: 13px; outline: none;
}
.add-person-row input:focus { border-color: var(--accent); }
.add-bureau-row {
  display: flex; gap: 8px; margin-top: 16px;
}
.add-bureau-row input {
  flex: 1; padding: 10px 14px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text); font-size: 14px; outline: none;
}
.add-bureau-row input:focus { border-color: var(--accent); }

/* Results */
.results-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.result-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  transition: border-color 0.2s;
}
.result-card:hover { border-color: var(--accent); }
.result-bureau { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
.result-rows { color: var(--text2); font-size: 13px; }
.result-download {
  margin-top: 10px;
  font-size: 12px;
  color: var(--accent);
  cursor: pointer;
  text-decoration: none;
}
.result-download:hover { text-decoration: underline; }

/* Stats */
.stats-row {
  display: flex; gap: 16px; margin-bottom: 20px;
}
.stat-card {
  flex: 1; background: var(--bg3); border-radius: 8px;
  padding: 16px; text-align: center;
}
.stat-value { font-size: 28px; font-weight: 700; }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-label { color: var(--text2); font-size: 12px; margin-top: 4px; }

.unmatched-list {
  display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px;
}
.unmatched-tag {
  background: rgba(255,69,58,0.15);
  color: var(--orange);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 13px;
}

/* Progress */
.progress-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
.progress-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px 48px;
  text-align: center;
  min-width: 300px;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.progress-text { font-size: 14px; color: var(--text2); }

/* Toast */
.toast {
  position: fixed; top: 24px; right: 24px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 20px;
  font-size: 14px; z-index: 999;
  transform: translateX(120%);
  transition: transform 0.3s;
  max-width: 360px;
}
.toast.show { transform: translateX(0); }
.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--red); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }
</style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">商机拆表工具</div>
    <div class="sidebar-nav">
      <div class="nav-item active" data-panel="upload">
        <span class="nav-icon">📂</span> 上传文件
      </div>
      <div class="nav-item" data-panel="mapping">
        <span class="nav-icon">👥</span> 分局人员
      </div>
      <div class="nav-item" data-panel="results">
        <span class="nav-icon">📊</span> 拆分结果
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">

    <!-- Upload Panel -->
    <div class="panel active" id="panel-upload">
      <h2>上传商机文件</h2>
      <p class="subtitle">上传需要拆分的 Excel 商机宽表，系统会自动识别客户经理列</p>

      <div class="card">
        <div class="card-title">选择文件</div>
        <div class="upload-zone" id="uploadZone">
          <input type="file" accept=".xlsx,.xls" id="fileInput">
          <div class="upload-icon">📄</div>
          <div class="upload-text">拖拽文件到此处，或 <em>点击上传</em></div>
          <div class="upload-text" style="margin-top:6px; font-size:12px;">支持 .xlsx / .xls 格式</div>
        </div>
        <div id="fileInfoBox" style="display:none">
          <div class="file-info">
            <span class="icon">📊</span>
            <div>
              <div class="name" id="fileName"></div>
              <div class="meta" id="fileMeta"></div>
            </div>
            <span class="remove" id="removeFile">✕</span>
          </div>
        </div>
      </div>

      <div class="card" id="managersCard" style="display:none">
        <div class="card-title">识别到的客户经理 <span class="badge" id="mgrCount"></span></div>
        <div class="unmatched-list" id="managersList"></div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" id="goMappingBtn" disabled>下一步：配置分局人员 →</button>
      </div>
    </div>

    <!-- Mapping Panel -->
    <div class="panel" id="panel-mapping">
      <h2>分局人员配置</h2>
      <p class="subtitle">编辑各分局对应的客户经理名单，未在名单中的经理将归入"未匹配"</p>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <div class="card-title" style="margin-bottom:0">分局列表 <span class="badge" id="bureauCount"></span></div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-outline btn-sm" id="collapseAll">全部折叠</button>
            <button class="btn btn-outline btn-sm" id="expandAll">全部展开</button>
            <button class="btn btn-outline btn-sm" id="resetMappingBtn">恢复默认</button>
          </div>
        </div>
        <div class="bureau-list" id="bureauList"></div>
        <div class="add-bureau-row">
          <input type="text" id="newBureauName" placeholder="输入新分局名称...">
          <button class="btn btn-primary btn-sm" id="addBureauBtn">添加分局</button>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-outline" id="goUploadBtn">← 上一步</button>
        <button class="btn btn-primary" id="goSplitBtn">执行拆分 →</button>
      </div>
    </div>

    <!-- Results Panel -->
    <div class="panel" id="panel-results">
      <h2>拆分结果</h2>
      <p class="subtitle">按分局拆分后的文件，可单独下载或打包下载</p>

      <div class="stats-row" id="statsRow">
        <div class="stat-card">
          <div class="stat-value green" id="matchedCount">-</div>
          <div class="stat-label">已匹配行数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value red" id="unmatchedCount">-</div>
          <div class="stat-label">未匹配行数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="fileCount">-</div>
          <div class="stat-label">生成文件数</div>
        </div>
      </div>

      <div class="card" id="unmatchedCard" style="display:none">
        <div class="card-title" style="color:var(--orange)">未匹配的客户经理</div>
        <div class="unmatched-list" id="unmatchedManagers"></div>
      </div>

      <div class="card">
        <div class="card-title">生成文件</div>
        <div class="results-grid" id="resultsGrid"></div>
      </div>

      <div class="btn-group">
        <button class="btn btn-outline" id="goMappingBtn2">← 返回修改</button>
        <button class="btn btn-primary" id="downloadAllBtn">打包下载全部</button>
      </div>
    </div>

  </div>
</div>

<!-- Progress Overlay -->
<div class="progress-overlay" id="progressOverlay" style="display:none">
  <div class="progress-card">
    <div class="spinner"></div>
    <div class="progress-text">正在拆分，请稍候...</div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============ State ============
let currentFile = null;
let mappingData = {};
let splitResult = null;

// ============ Nav ============
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    const panel = item.dataset.panel;
    switchPanel(panel);
  });
});

function switchPanel(panel) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-panel="${panel}"]`).classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${panel}`).classList.add('active');
}

// ============ Toast ============
function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = `toast ${type} show`;
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ============ Upload ============
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

uploadZone.addEventListener('dragover', e => {
  e.preventDefault();
  uploadZone.classList.add('dragover');
});
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => {
  if (e.target.files.length) handleFile(e.target.files[0]);
});
document.getElementById('removeFile').addEventListener('click', () => {
  currentFile = null;
  document.getElementById('fileInfoBox').style.display = 'none';
  document.getElementById('managersCard').style.display = 'none';
  document.getElementById('goMappingBtn').disabled = true;
  fileInput.value = '';
});

async function handleFile(file) {
  const formData = new FormData();
  formData.append('file', file);
  try {
    const res = await fetch('/api/upload', { method: 'POST', body: formData });
    const data = await res.json();
    if (!res.ok) { showToast(data.error, 'error'); return; }

    currentFile = data;
    document.getElementById('fileName').textContent = data.filename;
    document.getElementById('fileMeta').textContent = `${data.total_rows} 行数据 · ${data.headers.length} 列`;
    document.getElementById('fileInfoBox').style.display = 'block';

    // Show managers
    if (data.managers && data.managers.length) {
      document.getElementById('mgrCount').textContent = data.managers.length;
      const list = document.getElementById('managersList');
      list.innerHTML = data.managers.map(m => `<span class="unmatched-tag">${m}</span>`).join('');
      document.getElementById('managersCard').style.display = '';
    }

    document.getElementById('goMappingBtn').disabled = false;
    showToast('文件上传成功');
  } catch (err) {
    showToast('上传失败: ' + err.message, 'error');
  }
}

// ============ Mapping ============
document.getElementById('goMappingBtn').addEventListener('click', () => {
  switchPanel('mapping');
  loadMapping();
});
document.getElementById('goUploadBtn').addEventListener('click', () => switchPanel('upload'));
document.getElementById('goMappingBtn2').addEventListener('click', () => {
  switchPanel('mapping');
  loadMapping();
});

async function loadMapping() {
  const res = await fetch('/api/mapping');
  mappingData = await res.json();
  renderMapping();
}

function renderMapping() {
  const list = document.getElementById('bureauList');
  const keys = Object.keys(mappingData);
  document.getElementById('bureauCount').textContent = keys.length;

  list.innerHTML = keys.map((bureau, i) => {
    const managers = mappingData[bureau];
    return `
      <div class="bureau-card" data-index="${i}">
        <div class="bureau-header" onclick="toggleBureau(this)">
          <div style="display:flex;align-items:center;gap:10px;">
            <span class="arrow">▶</span>
            <span class="bureau-name">${bureau}</span>
            <span class="bureau-count">${managers.length} 人</span>
          </div>
          <div class="bureau-actions" onclick="event.stopPropagation()">
            <button class="btn btn-outline btn-sm" onclick="deleteBureau('${bureau}')">删除分局</button>
          </div>
        </div>
        <div class="bureau-body">
          <div class="manager-tags" id="tags-${i}">
            ${managers.map(m => `
              <span class="manager-tag">${m}<span class="x" onclick="removeManager('${bureau}','${m}')">✕</span></span>
            `).join('')}
          </div>
          <div class="add-person-row">
            <input type="text" id="addPerson-${i}" placeholder="输入姓名后回车添加" onkeydown="if(event.key==='Enter')addManager('${bureau}',${i})">
            <button class="btn btn-primary btn-sm" onclick="addManager('${bureau}',${i})">添加</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function toggleBureau(header) {
  const card = header.closest('.bureau-card');
  card.classList.toggle('open');
}

document.getElementById('collapseAll').addEventListener('click', () => {
  document.querySelectorAll('.bureau-card').forEach(c => c.classList.remove('open'));
});
document.getElementById('expandAll').addEventListener('click', () => {
  document.querySelectorAll('.bureau-card').forEach(c => c.classList.add('open'));
});

async function removeManager(bureau, name) {
  mappingData[bureau] = mappingData[bureau].filter(m => m !== name);
  await saveMapping();
  renderMapping();
}

async function addManager(bureau, index) {
  const input = document.getElementById(`addPerson-${index}`);
  const name = input.value.trim();
  if (!name) return;
  if (mappingData[bureau].includes(name)) { showToast('该人员已存在', 'error'); return; }
  mappingData[bureau].push(name);
  input.value = '';
  await saveMapping();
  renderMapping();
  // Re-open this bureau card
  document.querySelectorAll('.bureau-card').forEach(c => c.classList.add('open'));
}

async function deleteBureau(bureau) {
  if (!confirm(`确定删除分局「${bureau}」？`)) return;
  delete mappingData[bureau];
  await saveMapping();
  renderMapping();
}

document.getElementById('addBureauBtn').addEventListener('click', async () => {
  const name = document.getElementById('newBureauName').value.trim();
  if (!name) { showToast('请输入分局名称', 'error'); return; }
  if (mappingData[name]) { showToast('该分局已存在', 'error'); return; }
  mappingData[name] = [];
  document.getElementById('newBureauName').value = '';
  await saveMapping();
  renderMapping();
  document.querySelectorAll('.bureau-card').forEach(c => c.classList.add('open'));
  showToast(`已添加分局「${name}」`);
});

document.getElementById('resetMappingBtn').addEventListener('click', async () => {
  if (!confirm('确定恢复为默认映射？自定义修改将丢失。')) return;
  const res = await fetch('/api/reset-mapping', { method: 'POST' });
  mappingData = await res.json();
  // reload
  await loadMapping();
  showToast('已恢复默认映射');
});

async function saveMapping() {
  await fetch('/api/mapping', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(mappingData)
  });
}

// ============ Split ============
document.getElementById('goSplitBtn').addEventListener('click', doSplit);

async function doSplit() {
  if (!currentFile) { showToast('请先上传文件', 'error'); return; }

  const overlay = document.getElementById('progressOverlay');
  overlay.style.display = 'flex';

  try {
    const res = await fetch('/api/split', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mapping: mappingData })
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error, 'error'); overlay.style.display = 'none'; return; }

    splitResult = data;
    renderResults();
    switchPanel('results');
    showToast(`拆分完成！匹配 ${data.matched} 行，未匹配 ${data.unmatched} 行`);
  } catch (err) {
    showToast('拆分失败: ' + err.message, 'error');
  } finally {
    overlay.style.display = 'none';
  }
}

function renderResults() {
  document.getElementById('matchedCount').textContent = splitResult.matched;
  document.getElementById('unmatchedCount').textContent = splitResult.unmatched;
  document.getElementById('fileCount').textContent = splitResult.files.length;

  // Unmatched managers
  if (splitResult.unmatched_managers && splitResult.unmatched_managers.length) {
    document.getElementById('unmatchedManagers').innerHTML =
      splitResult.unmatched_managers.map(m => `<span class="unmatched-tag">${m}</span>`).join('');
    document.getElementById('unmatchedCard').style.display = '';
  } else {
    document.getElementById('unmatchedCard').style.display = 'none';
  }

  // File list
  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = splitResult.files.map(f => `
    <div class="result-card">
      <div class="result-bureau">${f.bureau}</div>
      <div class="result-rows">${f.rows} 行数据</div>
      <a class="result-download" href="/api/download-folder/${splitResult.output_folder}" download>
        下载
      </a>
    </div>
  `).join('');
}

document.getElementById('downloadAllBtn').addEventListener('click', () => {
  if (splitResult && splitResult.zip) {
    window.open('/api/download/' + splitResult.zip, '_blank');
  }
});
</script>
</body>
</html>
